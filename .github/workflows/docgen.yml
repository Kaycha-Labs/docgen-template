# Kaycha DocGen - Reusable Workflow
# Auto-generates canonical project docs + DEPS.yaml on every push.
# Consuming repos call this via: uses: Jamesjhf1/docgen-template/.github/workflows/docgen.yml@main

name: DocGen - Canonical Docs + DEPS.yaml

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      DOCGEN_GITHUB_TOKEN:
        required: true

jobs:
  docgen:
    runs-on: ubuntu-latest
    # Skip if this commit was made by DocGen itself (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[docgen]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.DOCGEN_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch DocGen engine
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.DOCGEN_GITHUB_TOKEN }}@github.com/Jamesjhf1/docgen-template.git /tmp/docgen-template
          cp -r /tmp/docgen-template/docgen ./docgen

      - name: Install dependencies
        run: |
          cd docgen
          npm install

      - name: Install tsx globally
        run: npm install -g tsx

      - name: Run DocGen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.DOCGEN_GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: tsx docgen/index.ts

      - name: Cleanup engine
        if: always()
        run: rm -rf docgen /tmp/docgen-template
